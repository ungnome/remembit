name: reusable_deploy

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      environment_url:
        type: string
        required: true
      git-ref:
        type: string
        required: true

jobs:
  supabase:
    name: supbabase
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment_url }}
    steps:
      - name: checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.git-ref }}

      - name: install pnpm
        run: npm install -g pnpm

      - name: install supabase cli
        uses: supabase/setup-cli@v1
        with:
          version: 1.1.6

      - name: install Dependencies
        run: pnpm install -r

      - name: supabase link
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: push db changes
        run: subabase db push

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    needs: [supabase]
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment_url }}
    steps:
      - name: deploy
        run: curl -X POST "${{secrets.RENDER_DEPLOY_WEBHOOK}}&ref=${{ inputs.git-ref }}"
